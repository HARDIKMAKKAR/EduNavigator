<body>
    <div class="form-container">
        <h2>Sign Up</h2>
        <form>
            <div class="input-group">
                <label for="name">Name</label>
                <input type="name" id="name" [(ngModel)] ="name" name="name"  required placeholder="Enter your Name">
            </div>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="username" id="username" [(ngModel)] ="username" name="username"  required placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" [(ngModel)] ="email" name="email"  required placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label for="phone">Phone</label>
                <input type="phone" id="phone" [(ngModel)] ="phone" name="phone" required placeholder="Enter your Phone Number">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" [(ngModel)] ="password" name="password" required placeholder="Enter your Password">
            </div>
            <div class="input-group">
                <label for="confirmpassword">Confirm Password</label>
                <input type="password" id="confirmpassword" [(ngModel)] ="confirmpassword" name="confirmpassword" required placeholder="Confirm your Password">
            </div>
            <button type="button" class="btn-submit" (click)="signUpUser()"  >Create Account</button>
        </form>
        <div class="signup-link">
            <p>Already have an account? <a routerLink="/login">Sign In</a></p>
        </div>
    </div>
</body>
