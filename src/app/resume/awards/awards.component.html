<h3>Add Award</h3>
<form [formGroup]="awardForm" (ngSubmit)="submitAwards()">
  <div formArrayName="awardEntries">
    <div *ngFor="let entry of awardEntries.controls; let i = index" [formGroupName]="i">
      <div>
        <label for="title">Title:</label>
        <input id="title" formControlName="title" required>
        <div *ngIf="entry.get('title').invalid && entry.get('title').touched">Title is required.</div>
      </div>
      <div>
        <label for="organization">Organization:</label>
        <input id="organization" formControlName="organization" required>
        <div *ngIf="entry.get('organization').invalid && entry.get('organization').touched">Organization is required.</div>
      </div>
      <div>
        <label for="year">Year:</label>
        <input id="year" type="number" formControlName="year" required>
        <div *ngIf="entry.get('year').invalid && entry.get('year').touched">Year is required and must be 4 digits.</div>
      </div>
      <div>
        <label for="description">Description:</label>
        <input id="description" formControlName="description">
      </div>
      <button type="button" (click)="removeAward(i)">Remove</button>
      <hr>
    </div>
  </div>
  <button type="button" (click)="addAward()">Add More Award</button>
  <button type="submit" [disabled]="awardForm.invalid">Submit Awards</button>
</form>

<h3>Your Awards</h3>
<ul>
  <li *ngFor="let award of resumeService.resumeData.awards; let i = index">
    <strong>{{ award.title }}</strong> from {{ award.organization }} ({{ award.year }}): {{ award.description }}
    <button (click)="removeAward(i)">Remove</button>
  </li>
</ul>
